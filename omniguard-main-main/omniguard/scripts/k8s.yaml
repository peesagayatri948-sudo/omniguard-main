# OmniGuard Kubernetes Deployment
# Usage: kubectl apply -f k8s.yaml
#
# Prerequisites:
#   1. Create namespace: kubectl create namespace omniguard
#   2. Create secret:
#      kubectl create secret generic omniguard-secrets -n omniguard \
#        --from-literal=VITE_SUPABASE_URL=https://xyz.supabase.co \
#        --from-literal=VITE_SUPABASE_ANON_KEY=eyJ...
#   3. Configure Ingress host, TLS as needed

---
apiVersion: v1
kind: Namespace
metadata:
  name: omniguard
  labels:
    app.kubernetes.io/name: omniguard

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: omniguard-config
  namespace: omniguard
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omniguard-dashboard
  namespace: omniguard
  labels:
    app.kubernetes.io/name: omniguard
    app.kubernetes.io/component: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: omniguard
      app.kubernetes.io/component: dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omniguard
        app.kubernetes.io/component: dashboard
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: dashboard
          image: ghcr.io/omniguard/omniguard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: omniguard-config
            - secretRef:
                name: omniguard-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: omniguard-dashboard
  namespace: omniguard
  labels:
    app.kubernetes.io/name: omniguard
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      name: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: omniguard
    app.kubernetes.io/component: dashboard

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omniguard-ingress
  namespace: omniguard
  labels:
    app.kubernetes.io/name: omniguard
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - security.yourcompany.com
      secretName: omniguard-tls
  rules:
    - host: security.yourcompany.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: omniguard-dashboard
                port:
                  number: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: omniguard-hpa
  namespace: omniguard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: omniguard-dashboard
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: omniguard-pdb
  namespace: omniguard
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: omniguard
