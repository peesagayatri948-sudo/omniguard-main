apiVersion: apps/v1
kind: Deployment
metadata:
  name: omniguard-enterprise
  labels:
    app: omniguard-enterprise
spec:
  replicas: 2
  selector:
    matchLabels:
      app: omniguard-enterprise
  template:
    metadata:
      labels:
        app: omniguard-enterprise
    spec:
      containers:
      - name: omniguard
        image: omniguard-enterprise:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5173
          name: frontend
        - containerPort: 5175
          name: daemon
        env:
        - name: OMNIGUARD_DAEMON_PORT
          value: "5175"
        - name: AI_PROVIDER
          value: "anthropic"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5175
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 5175
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
